# Alembic configuration for RSVP60.
#
# The database URL is NOT hard-coded here — migrations/env.py reads it from the
# application settings (DATABASE_URL env var), so migrations always target the
# same database as the app.

[alembic]
script_location = migrations
prepend_sys_path = .
# Use OS path separator; keep version files sortable by their numeric prefix.
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
